<html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Contact Me</title>

<link rel="stylesheet" href="style.css">

<script>

function checkForm(){

var name = document.forms["contactForm"]["fullname"].value;
var email = document.forms["contactForm"]["email"].value;
var country = document.forms["contactForm"]["country"].value;
var comments = document.forms["contactForm"]["comments"].value;

if(name=="" || email=="" || country=="" || comments=="")
{
alert("Please fill in all fields");
return false;
}

alert("Form submitted successfully");

return true;

}

</script>

</head>

<body>

<nav>
<a href="index.html">Home</a> |
<a href="contact.html">Contact Me</a>
</nav>

<h1>Contact Me</h1>

<form name="contactForm" onsubmit="return checkForm()">

<label>Full Name:</label><br>
<input type="text" name="fullname"><br><br>

<label>Email Address:</label><br>
<input type="email" name="email"><br><br>

<label>Country:</label><br>
<input type="text" name="country"><br><br>

<label>Comments:</label><br>
<textarea name="comments"></textarea><br><br>

<input type="submit" value="Submit">

</form>

</body>

</html>
